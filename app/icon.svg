<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="100%" height="100%">
  <!-- Base premium dark circular background -->
  <circle cx="90" cy="90" r="86" fill="#0a0a08" stroke="#222220" stroke-width="2" />
  
  <!-- Signature path for "hd" initials (neon glow layer) -->
  <path d="M 45 105 C 60 105, 55 40, 70 40 C 80 40, 75 120, 75 120 C 75 120, 80 90, 95 90 C 105 90, 102 120, 102 120 C 102 120, 115 120, 120 105 C 115 95, 112 85, 125 85 C 135 85, 132 110, 132 120 M 132 120 L 132 45 C 132 40, 137 40, 137 45 L 137 120 C 137 128, 145 132, 155 118" 
        fill="none" 
        stroke="#d4ff00" 
        stroke-width="7" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#glow)" />
        
  <!-- Core signature path (high-contrast overlay layer) -->
  <path d="M 45 105 C 60 105, 55 40, 70 40 C 80 40, 75 120, 75 120 C 75 120, 80 90, 95 90 C 105 90, 102 120, 102 120 C 102 120, 115 120, 120 105 C 115 95, 112 85, 125 85 C 135 85, 132 110, 132 120 M 132 120 L 132 45 C 132 40, 137 40, 137 45 L 137 120 C 137 128, 145 132, 155 118" 
        fill="none" 
        stroke="#ffffff" 
        stroke-width="2" 
        stroke-linecap="round" 
        stroke-linejoin="round" />

  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
</svg>
